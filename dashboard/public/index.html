<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Selfbot Pro - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #2a2a2a;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: #5865F2;
    }

    .stat-card h3 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #5865F2;
    }

    .logs-section {
      background: #1a1a1a;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
    }

    .logs-header {
      background: #252525;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logs-header h2 {
      font-size: 1.25rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00FF00;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .logs-container {
      max-height: 500px;
      overflow-y: auto;
      padding: 1rem;
    }

    .log-entry {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.875rem;
      padding: 0.5rem;
      margin-bottom: 0.25rem;
      border-radius: 4px;
      display: flex;
      gap: 1rem;
    }

    .log-entry:hover {
      background: #252525;
    }

    .log-timestamp {
      color: #666;
      min-width: 150px;
    }

    .log-level {
      min-width: 60px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .log-level.error { color: #ff4444; }
    .log-level.warn { color: #ffaa00; }
    .log-level.info { color: #00aaff; }
    .log-level.debug { color: #888; }
    .log-level.cmd { color: #ff00ff; }
    .log-level.voice { color: #00ffaa; }
    .log-level.ready { color: #00ff00; }

    .log-message {
      color: #ddd;
      flex: 1;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn {
      background: #5865F2;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #4752C4;
    }

    .btn-danger {
      background: #ed4245;
    }

    .btn-danger:hover {
      background: #c03537;
    }

    .footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      border-top: 1px solid #2a2a2a;
      margin-top: 2rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🤖 Discord Selfbot Pro</h1>
    <p>Panel de control y monitoreo en tiempo real</p>
  </header>

  <div class="container">
    <div class="controls">
      <button class="btn" onclick="refreshStats()">🔄 Actualizar</button>
      <button class="btn btn-danger" onclick="restartBot()">🔄 Reiniciar Bot</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>📊 Comandos Ejecutados</h3>
        <div class="value" id="commands">-</div>
      </div>
      <div class="stat-card">
        <h3>💬 Mensajes Recibidos</h3>
        <div class="value" id="messages">-</div>
      </div>
      <div class="stat-card">
        <h3>🔊 Conexiones de Voz</h3>
        <div class="value" id="voice">-</div>
      </div>
      <div class="stat-card">
        <h3>🔄 Reconexiones</h3>
        <div class="value" id="reconnections">-</div>
      </div>
    </div>

    <div class="logs-section">
      <div class="logs-header">
        <h2>📜 Logs Recientes</h2>
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>En línea</span>
        </div>
      </div>
      <div class="logs-container" id="logs">
        <div class="log-entry">
          <span class="log-timestamp">--:--:--</span>
          <span class="log-level info">INFO</span>
          <span class="log-message">Cargando logs...</span>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Discord Selfbot Pro v2.0 | Desarrollado con ❤️</p>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Cargar estadísticas
    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();

        // Actualizar logs
        const logsContainer = document.getElementById('logs');
        logsContainer.innerHTML = '';

        if (data.logs && data.logs.length > 0) {
          data.logs.reverse().forEach(log => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timestamp = new Date(log.timestamp).toLocaleTimeString();
            const level = (log.level || 'info').toLowerCase();

            entry.innerHTML = `
              <span class="log-timestamp">${timestamp}</span>
              <span class="log-level ${level}">${level}</span>
              <span class="log-message">${escapeHtml(log.message)}</span>
            `;

            logsContainer.appendChild(entry);
          });
        }
      } catch (error) {
        console.error('Error cargando estadísticas:', error);
      }
    }

    function refreshStats() {
      loadStats();
    }

    function restartBot() {
      if (confirm('¿Estás seguro de que quieres reiniciar el bot?')) {
        fetch('/api/command', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer admin123'
          },
          body: JSON.stringify({ command: 'restart' })
        });
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Cargar al iniciar
    loadStats();

    // Actualizar cada 5 segundos
    setInterval(loadStats, 5000);

    // Socket.io events
    socket.on('connect', () => {
      console.log('Conectado al servidor');
    });

    socket.on('disconnect', () => {
      console.log('Desconectado del servidor');
    });
  </script>
</body>
</html>
